<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criue</title>
    <meta name="description" content="Criue the ultimate fluid workspace." />
    <meta name="theme-color" content="#000000" id="theme-color-meta" />

    <style>
      body {
        margin: 0;

        min-height: 100%;

        background: #ffffff;
      }

      .topbar,
      .bottombar {
        pointer-events: none;

        position: fixed;

        left: 50%;

        transform: translateX(-50%);

        z-index: 999;
      }

      .topbar {
        top: 4px;

        width: 89%;

        height: 11px;

        display: block;

        /* Rainbow effect disabled for clarity, static color used instead */

        background: oklch(0% 0 0);

        /* Hack to style the browser UI while making it invisible to the user */

        mask-image: linear-gradient(to right, transparent, transparent);

        -webkit-mask-image: linear-gradient(to right, transparent, transparent);
      }

      .bottombar {
        bottom: 3px;

        width: 89%;

        height: 11px;

        display: block;

        /* Rainbow effect disabled for clarity, static color used instead */

        background: oklch(0% 0 0);

        /* Hack to style the browser UI while making it invisible to the user */

        mask-image: linear-gradient(to right, transparent, transparent);

        -webkit-mask-image: linear-gradient(to right, transparent, transparent);
      }
    </style>
  </head>
  <body>
    <div class="topbar" aria-hidden="true"></div>
    <div class="bottombar" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

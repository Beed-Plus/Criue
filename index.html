<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criue</title>
    <meta name="description" content="Criue the ultimate fluid workspace." />
    <meta name="theme-color" content="#000000" id="theme-color-meta" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;900&display=swap" rel="stylesheet" />

    <style>
      html, body {
        margin: 0;
        height: 100vh;
        height: 100dvh;
        background-color: #000000 !important;
        /* Stops iOS from shifting the viewport and showing white when scrolling */
        overscroll-behavior: none; 
      }

      .topbar,
      .bottombar {
        pointer-events: none;
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
      }

      .topbar {
        top: 4px;
        width: 89%;
        height: 11px;
        display: block;
        background: #000000;
        /* Fix: We use low opacity instead of transparent masks so iOS can still read the dark color */
        opacity: 0.002; 
      }

      .bottombar {
        bottom: 3px;
        width: 89%;
        height: 11px;
        display: block;
        background: #000000;
        /* Fix: Opacity 0.002 makes it completely invisible to users, but lets iOS see the black color */
        opacity: 0.002; 
      }
    </style>

  </head>
  <body>
    <div class="topbar" aria-hidden="true"></div>
    <div class="bottombar" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
